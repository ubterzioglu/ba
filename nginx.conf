server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Gzip sıkıştırma
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml application/xml+rss text/javascript
                      image/svg+xml application/wasm;

    # SPA yönlendirmesi: bilinmeyen yolları index.html'e düşür
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hash'li statik varlıklar — uzun süreli önbellek (immutable)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # index.html önbelleğe alınmaz (her zaman güncel)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # robots.txt ve sitemap.xml doğrudan servis edilsin
    location = /robots.txt  { log_not_found off; access_log off; }
    location = /sitemap.xml { log_not_found off; access_log off; }

    # Temel güvenlik başlıkları
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 404 yine index.html (client-side router 404 sayfasını gösterir)
    error_page 404 /index.html;
}
