# Coolify "Docker Compose" build pack için (isteğe bağlı).
# Coolify'da "Dockerfile" build pack'i de doğrudan Dockerfile'ı kullanabilir;
# bu compose, build args'ı açıkça geçirmek isterseniz kolaylık sağlar.
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Coolify bu değerleri Environment Variables (Build Variable) olarak enjekte eder
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
    ports:
      - "80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
